<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3B6FF2" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- iOS ignores the web manifest for home-screen install — it needs its
         own explicit tags to behave like a real installed app. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Clearway" />
    <title>Clearway — Debt Free & Saving</title>
    <script>
      (function () {
        var stored = localStorage.getItem("clearway-theme");
        var dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
  </head>
  <body class="bg-surface-light text-slate-900 dark:bg-surface-dark dark:text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
